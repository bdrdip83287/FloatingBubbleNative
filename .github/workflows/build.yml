name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clean everything
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf .gradle
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew clean assembleDebug --stacktrace --no-daemon --no-build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: floating-notes-debug
          path: app/build/outputs/apk/debug/*.apk
